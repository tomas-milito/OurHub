<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Documentacion y organizacion logo">
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="56" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <linearGradient id="leather" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4efe2"/>
      <stop offset="0.2" stop-color="#d8c8a8"/>
      <stop offset="0.52" stop-color="#6b351c"/>
      <stop offset="1" stop-color="#1d130c"/>
    </linearGradient>
    <radialGradient id="glow" cx="34%" cy="25%" r="70%">
      <stop offset="0" stop-color="#fff7dc" stop-opacity="0.75"/>
      <stop offset="0.44" stop-color="#b08a53" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="18" fill="url(#leather)" filter="url(#grain)"/>
  <rect x="16" y="16" width="96" height="96" rx="13" fill="none" stroke="#f4efe2" stroke-opacity="0.38" stroke-width="2"/>
  <rect x="24" y="24" width="80" height="80" rx="9" fill="url(#glow)" opacity="0.64"/>
  <path d="M30 102 C48 94, 80 112, 100 96" fill="none" stroke="#f4efe2" stroke-opacity="0.18" stroke-width="5"/>
  <text x="64" y="70" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="#fff7e8" stroke="#2d2218" stroke-width="1.2">DYO</text>
</svg>